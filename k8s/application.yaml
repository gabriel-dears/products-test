apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: products-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/products-api.git'
    targetRevision: main
    path: k8s
    kustomize:
      namePrefix: products-api-
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas